<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <title>Refresh Tap-to-Track</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; color: #173f35; background: #f3efe5; }
      main { max-width: 32rem; padding: 2rem; text-align: center; }
    </style>
  </head>
  <body>
    <main><h1>Refreshing Tap-to-Track</h1><p>Clearing an older offline copy, then reopening the app...</p></main>
    <script>
      Promise.all([
        navigator.serviceWorker ? navigator.serviceWorker.getRegistrations().then((items) => Promise.all(items.map((item) => item.unregister()))) : Promise.resolve(),
        window.caches ? caches.keys().then((keys) => Promise.all(keys.map((key) => caches.delete(key)))) : Promise.resolve()
      ]).finally(() => location.replace("/?refreshed=1"));
    </script>
  </body>
</html>
